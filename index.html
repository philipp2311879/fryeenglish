<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Frye English</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  background:#000;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:30px 20px;
  position:relative;
  overflow:hidden;
}

/* subtle animated grain */
body::before{
  content:'';
  position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;opacity:.4;
}

/* subtle glow behind logo */
.glow{
  position:fixed;
  width:500px;height:500px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(255,214,0,.06) 0%,transparent 70%);
  top:50%;left:50%;
  transform:translate(-50%,-60%);
  pointer-events:none;z-index:0;
}

.content{
  position:relative;z-index:1;
  display:flex;flex-direction:column;
  align-items:center;
  width:100%;max-width:420px;
}

/* LOGO */
.logo{
  font-size:clamp(2.8rem,10vw,4.2rem);
  font-weight:900;
  letter-spacing:-1px;
  line-height:1;
  margin-bottom:6px;
  color:#fff;
}
.logo span{color:#ffd600;}

.tagline{
  font-size:.7rem;
  font-weight:600;
  letter-spacing:4px;
  text-transform:uppercase;
  color:rgba(255,255,255,.3);
  margin-bottom:60px;
}

/* INPUT AREA */
.input-label{
  font-size:.65rem;
  font-weight:700;
  letter-spacing:3px;
  text-transform:uppercase;
  color:rgba(255,255,255,.35);
  margin-bottom:14px;
  align-self:flex-start;
}

.input-wrap{
  width:100%;
  position:relative;
  margin-bottom:14px;
}

.code-input{
  width:100%;
  background:transparent;
  border:1.5px solid rgba(255,255,255,.15);
  border-radius:12px;
  padding:18px 22px;
  font-size:1.3rem;
  font-weight:700;
  letter-spacing:6px;
  text-transform:uppercase;
  color:#fff;
  outline:none;
  -webkit-appearance:none;
  transition:border-color .2s;
  text-align:center;
}
.code-input::placeholder{
  color:rgba(255,255,255,.18);
  letter-spacing:3px;
  font-size:1rem;
  font-weight:400;
}
.code-input:focus{
  border-color:rgba(255,214,0,.5);
  box-shadow:0 0 0 3px rgba(255,214,0,.08);
}

.enter-btn{
  width:100%;
  background:#ffd600;
  color:#000;
  border:none;
  border-radius:12px;
  padding:18px;
  font-size:1rem;
  font-weight:800;
  letter-spacing:1px;
  cursor:pointer;
  -webkit-appearance:none;
  min-height:56px;
  transition:opacity .15s, transform .1s;
}
.enter-btn:active{transform:scale(.98);opacity:.9;}
.enter-btn:disabled{opacity:.25;cursor:not-allowed;}

/* ERROR */
.error{
  margin-top:14px;
  font-size:.8rem;
  font-weight:600;
  color:#ff4466;
  text-align:center;
  min-height:20px;
  letter-spacing:.5px;
  transition:opacity .2s;
}

/* FOOTER */
.footer{
  position:fixed;
  bottom:0;left:0;right:0;
  padding:16px 20px calc(env(safe-area-inset-bottom,0px)+16px);
  display:flex;
  justify-content:center;
  gap:24px;
  z-index:1;
}
.footer a{
  color:rgba(255,255,255,.2);
  font-size:.65rem;
  font-weight:600;
  letter-spacing:2px;
  text-transform:uppercase;
  text-decoration:none;
}
.footer a:hover{color:rgba(255,255,255,.5);}
</style>
</head>
<body>

<div class="glow"></div>

<div class="content">
  <div class="logo">Frye <span>English</span></div>
  <div class="tagline">Grammar Practice</div>

  <div class="input-label">Enter your access code</div>

  <div class="input-wrap">
    <input
      class="code-input"
      id="codeInput"
      type="text"
      inputmode="text"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="characters"
      spellcheck="false"
      maxlength="10"
      placeholder="_ _ _ _ _ _"
    />
  </div>

  <button class="enter-btn" id="enterBtn" disabled>Enter →</button>

  <div class="error" id="errorMsg"></div>
</div>

<div class="footer">
  <a href="impressum.html">Impressum</a>
  <a href="datenschutz.html">Datenschutz</a>
</div>

<script>
// ── ADD YOUR CODES HERE ──────────────────────────
var CODES = {
  '0815': 'tobe01.html',
  '0101': 'vocgrocery.html',
  '0009': 'mathver.html',
  // 'VERB02': 'verb02.html',   ← so fügst du später neue Tests hinzu
  // 'ADJ03':  'adj03.html',
};
// ─────────────────────────────────────────────────

var input  = document.getElementById('codeInput');
var btn    = document.getElementById('enterBtn');
var errMsg = document.getElementById('errorMsg');

input.addEventListener('input', function(){
  var val = input.value.trim();
  btn.disabled = val.length === 0;
  errMsg.textContent = '';
});

input.addEventListener('keydown', function(e){
  if(e.key === 'Enter' && !btn.disabled) go();
});

btn.addEventListener('click', go);
btn.addEventListener('touchend', function(e){ e.preventDefault(); go(); });

function go(){
  var code = input.value.trim().toUpperCase();
  if(CODES[code]){
    window.location.href = CODES[code];
  } else {
    errMsg.textContent = 'Code not found. Please try again.';
    input.value = '';
    btn.disabled = true;
    input.focus();
  }
}
</script>
</body>
</html>
